name: Build Image and send to DockerHub
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

          # using docker repo secrets
          # piping token to login because
          # we can use --password_stdin to securely use token
      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

          # building and pushing image to dockerhub
      - name: Build Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/first-image .

      - name: Push Image to Dockerhub
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/first-image
